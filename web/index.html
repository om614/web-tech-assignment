<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Tech Assignment</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Web Tech Assignment</h1>
    <p>Simple form with validation and a button click demo.</p>
  </header>

  <main class="container">
    <section class="card" aria-labelledby="form-title">
      <h2 id="form-title">Contact Form</h2>

      <form id="contact-form" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Jane Doe" autocomplete="name" required minlength="2" />
          <span class="error" id="name-error" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="jane@example.com" autocomplete="email" required />
          <span class="error" id="email-error" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4" placeholder="Write your message..." required minlength="5"></textarea>
          <span class="error" id="message-error" aria-live="polite"></span>
        </div>

        <div class="actions">
          <button class="btn" type="submit" id="submit-btn">Submit</button>
          <button class="btn btn-secondary" type="button" id="clear-btn">Clear</button>
        </div>

        <p class="success" id="success" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
